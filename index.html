<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Réseaux-Résident — La plateforme de vie locale qui connecte résidents, commerçants, associations et mairie. Votre ville, connectée." />
    <meta name="theme-color" content="#1a3a5c" />

    <!-- Preconnect pour performances -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://js.stripe.com" />

    <!-- Fonts via link (pas @import CSS — non render-blocking avec display=swap) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Réseaux-Résident" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- OG + Twitter -->
    <meta property="og:title" content="Réseaux-Résident" />
    <meta property="og:description" content="La plateforme de vie locale de votre ville" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Réseaux-Résident" />
    <meta name="twitter:description" content="Votre plateforme de vie locale — avantages, projets, événements." />

    <title>Réseaux-Résident — Votre ville, connectée</title>

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Réseaux-Résident",
      "description": "La plateforme de vie locale qui connecte résidents, commerçants, associations et mairie.",
      "url": "https://reseaux-resident.fr",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
      "author": { "@type": "Organization", "name": "Réseaux-Résident", "url": "https://reseaux-resident.fr" }
    }
    </script>

    <!-- CSS critique inline pour FCP immédiat -->
    <style>
      body{margin:0;background:#faf7f2;color:#1c1c1c;font-family:"Source Sans 3",system-ui,sans-serif}
      #root{min-height:100vh}
      .initial-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem}
      .initial-loader .spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#1a3a5c;border-radius:50%;animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root"><div class="initial-loader"><div class="spinner"></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
      }
    </script>
  </body>
</html>
